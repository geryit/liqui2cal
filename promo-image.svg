<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e3148;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg-grad)"/>

  <!-- Logo (extracted from logo.svg, scaled up) -->
  <g transform="translate(40, 60) scale(1.2)">
    <!-- Calendar body -->
    <rect x="22" y="34" width="76" height="70" rx="8" ry="8" fill="#3b4261"/>

    <!-- Calendar top bar -->
    <rect x="22" y="34" width="76" height="20" rx="8" ry="8" fill="#34d399"/>
    <rect x="22" y="46" width="76" height="8" fill="#34d399"/>

    <!-- Calendar rings -->
    <rect x="42" y="26" width="6" height="18" rx="3" ry="3" fill="#d1d5db"/>
    <rect x="72" y="26" width="6" height="18" rx="3" ry="3" fill="#d1d5db"/>

    <!-- Grid dots -->
    <circle cx="40" cy="68" r="4" fill="#9ca3af"/>
    <circle cx="56" cy="68" r="4" fill="#9ca3af"/>
    <circle cx="72" cy="68" r="4" fill="#9ca3af"/>
    <circle cx="88" cy="68" r="4" fill="#9ca3af"/>
    <circle cx="40" cy="86" r="4" fill="#9ca3af"/>
    <circle cx="56" cy="86" r="4" fill="#9ca3af"/>
    <circle cx="88" cy="86" r="4" fill="#9ca3af"/>

    <!-- Highlighted day -->
    <circle cx="72" cy="86" r="9" fill="#34d399"/>
    <polyline points="67,86 71,90 78,82" fill="none" stroke="#1e2030" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Green up-arrow badge -->
    <circle cx="102" cy="20" r="17" fill="#34d399"/>
    <polyline points="95,21 102,13 109,21" fill="none" stroke="#1e2030" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="102" y1="13" x2="102" y2="28" stroke="#1e2030" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="180" y="115" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#34d399">Liqui2Cal</text>

  <!-- Subtitle -->
  <text x="180" y="150" font-family="Arial, sans-serif" font-size="16" fill="#d1d5db">Add Liquipedia matches to</text>
  <text x="180" y="172" font-family="Arial, sans-serif" font-size="16" fill="#d1d5db">your Google Calendar</text>

  <!-- Tagline / Call to action -->
  <rect x="180" y="200" width="140" height="30" rx="15" fill="#34d399"/>
  <text x="250" y="221" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e2030">FREE EXTENSION</text>
</svg>
