<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feOffset dx="0" dy="4" result="offsetBlur" />
      <feFlood flood-color="#000000" flood-opacity="0.5" result="offsetColor"/>
      <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Decorative Circles -->
  <circle cx="1100" cy="100" r="200" fill="#34d399" fill-opacity="0.03" />
  <circle cx="100" cy="600" r="150" fill="#34d399" fill-opacity="0.05" />

  <!-- Main Content Area -->
  <g transform="translate(100, 180)">
    <!-- Logo Icon (Reconstructed from logo.svg) -->
    <g transform="scale(1.8) translate(0, 0)" filter="url(#softShadow)">
      <rect width="128" height="128" rx="26" ry="26" fill="#1e2030" stroke="#34d399" stroke-width="2" stroke-opacity="0.3"/>
      <rect x="22" y="34" width="76" height="70" rx="8" ry="8" fill="#2e3148"/>
      <rect x="22" y="34" width="76" height="20" rx="8" ry="8" fill="#34d399"/>
      <rect x="22" y="46" width="76" height="8" fill="#34d399"/>
      <rect x="42" y="26" width="6" height="18" rx="3" ry="3" fill="#d1d5db"/>
      <rect x="72" y="26" width="6" height="18" rx="3" ry="3" fill="#d1d5db"/>
      <circle cx="72" cy="86" r="9" fill="#34d399"/>
      <polyline points="67,86 71,90 78,82" fill="none" stroke="#1e2030" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="102" cy="20" r="17" fill="#34d399"/>
      <polyline points="95,21 102,13 109,21" fill="none" stroke="#1e2030" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="102" y1="13" x2="102" y2="28" stroke="#1e2030" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Text Content -->
    <g transform="translate(280, 50)">
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="100" fill="white" filter="url(#glow)">
        Liqui<tspan fill="#34d399">2</tspan>Cal
      </text>
      <text transform="translate(0, 70)" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="36" fill="#9ca3af">
        Add Liquipedia matches to Google Calendar
      </text>
    </g>
  </g>

  <!-- Stylized Match Card Representation -->
  <g transform="translate(550, 420)" filter="url(#softShadow)">
    <rect width="550" height="200" rx="16" ry="16" fill="#1e2030" stroke="#334155" stroke-width="1" />

    <!-- Tournament Name -->
    <text x="30" y="45" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" font-weight="600">RED BULL WOLOLO: LONDINIUM</text>

    <!-- Matchup -->
    <text x="30" y="95" font-family="system-ui, sans-serif" font-size="32" fill="white" font-weight="700">
      PLAYER 1 <tspan fill="#64748b" font-weight="400">vs</tspan> PLAYER 2
    </text>

    <!-- Time -->
    <text x="30" y="130" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="600">Today at 18:30 UTC</text>

    <!-- The "Add to Calendar" Button -->
    <g transform="translate(30, 150)">
      <rect width="180" height="36" rx="6" fill="#34d399" />
      <g transform="translate(12, 10) scale(0.7)">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke="#111827" stroke-width="2.5" fill="none"/>
        <line x1="16" y1="2" x2="16" y2="6" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="2" x2="8" y2="6" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="21" y2="10" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="12" y1="14" x2="12" y2="18" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="10" y1="16" x2="14" y2="16" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <text x="40" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#111827" font-weight="700">Add to Calendar</text>
    </g>

    <!-- Liquipedia Aesthetic Elements (Mini icons) -->
    <circle cx="510" cy="40" r="10" fill="#34d399" fill-opacity="0.2" />
    <path d="M 505 40 L 515 40 M 510 35 L 510 45" stroke="#34d399" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Chrome Extension Badge -->
  <g transform="translate(1100, 650)">
    <rect width="140" height="40" rx="20" fill="#1e2030" stroke="#334155" stroke-width="1" />
    <text x="70" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">CHROME EXTENSION</text>
  </g>

</svg>
